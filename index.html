<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8"/>
<title>ניהול הפקות · Methodica</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css?v=22"/>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Firebase compat SDK (script-tag friendly; works with our no-build setup). -->
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="firebase-config.js?v=2"></script>
<script src="firebase-init.js?v=1"></script>

<script src="data.js?v=3"></script>
<script type="text/babel" src="components.jsx?v=4"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="view_board.jsx?v=12"></script>
<script type="text/babel" src="view_matrix.jsx?v=8"></script>
<script type="text/babel" src="view_producer_history.jsx"></script>
<script type="text/babel" src="view_producer.jsx?v=6"></script>

<script type="text/babel">
// One-time restore of canonical producers that may have been accidentally deleted.
// Runs once per browser, then a flag in localStorage prevents it from running again,
// so the user can legitimately delete these producers later if desired.
(function restoreDefaultProducers() {
  try {
    if (localStorage.getItem('producers-restore-vAK-v1')) return;
    const saved = localStorage.getItem('producers');
    if (saved) {
      const list = JSON.parse(saved);
      const ids = new Set(list.map(p => p.id));
      const targets = ['vadim', 'arik', 'kholod'];
      const missing = targets.filter(id => !ids.has(id));
      if (missing.length && Array.isArray(window.PRODUCERS)) {
        const toAdd = window.PRODUCERS.filter(p => missing.includes(p.id));
        if (toAdd.length) localStorage.setItem('producers', JSON.stringify([...list, ...toAdd]));
      }
    }
    localStorage.setItem('producers-restore-vAK-v1', '1');
  } catch {}
})();

function UndoButton({ count, onUndo }) {
  if (count === 0) return null;
  return (
    <button className="undo-fab" onClick={onUndo}
      title={'בטל פעולה אחרונה (' + count + ' זמינות) · Ctrl+Z'}>
      <span className="undo-icon">↶</span>
      <span>ביטול</span>
      <span className="undo-count">{count}</span>
    </button>
  );
}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "regular",
  "accent": "#EC8223",
  "showFireIcons": true,
  "showCapacityBars": true,
  "warmCream": false,
  "loadStyle": "bars"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  // Theme (light / dark). Persisted to localStorage and reflected as data-theme on <html>.
  const [theme, setTheme] = React.useState(() => {
    try { return localStorage.getItem('theme') || 'light'; } catch { return 'light'; }
  });
  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    try { localStorage.setItem('theme', theme); } catch {}
  }, [theme]);
  const [view, setView] = React.useState(() => {
    try { return localStorage.getItem('view') || 'board'; } catch { return 'board'; }
  });
  const [producerId, setProducerId] = React.useState(() => {
    try { return localStorage.getItem('producerId') || 'ron'; } catch { return 'ron'; }
  });
  const [teams, setTeamsRaw] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('teams') || '[]'); } catch { return []; }
  });
  const setTeams = React.useCallback((val) => {
    setTeamsRaw(prev => {
      const next = typeof val === 'function' ? val(prev) : val;
      try { localStorage.setItem('teams', JSON.stringify(next)); } catch {}
      return next;
    });
  }, []);

  const [producers, setProducersRaw] = React.useState(() => {
    try {
      const saved = localStorage.getItem('producers');
      const list = saved ? JSON.parse(saved) : window.PRODUCERS;
      window.PRODUCERS = list;
      return list;
    } catch { return window.PRODUCERS; }
  });

  const setProducers = React.useCallback((val) => {
    setProducersRaw(prev => {
      const next = typeof val === 'function' ? val(prev) : val;
      window.PRODUCERS = next;
      try { localStorage.setItem('producers', JSON.stringify(next)); } catch {}
      return next;
    });
  }, []);

  // Lifted shared state: projects (board edits + per-row reportLink/folderLink) sync across views.
  const [projects, setProjectsRaw] = React.useState(() => {
    const base = window.PROJECTS.map(p => ({ ...p, urgency: p.urgency || 'normal', archived: false }));
    try {
      const savedFull = JSON.parse(localStorage.getItem('projects-v2') || 'null');
      if (Array.isArray(savedFull) && savedFull.length) { window.PROJECTS = savedFull; return savedFull; }
      // Backward-compat: only an order array was saved before
      const savedOrder = JSON.parse(localStorage.getItem('board-order') || 'null');
      if (Array.isArray(savedOrder) && savedOrder.length) {
        const byId = new Map(base.map(p => [p.id, p]));
        const ordered = savedOrder.map(id => byId.get(id)).filter(Boolean);
        const seen = new Set(savedOrder);
        const extras = base.filter(p => !seen.has(p.id));
        const merged = [...ordered, ...extras];
        window.PROJECTS = merged;
        return merged;
      }
    } catch {}
    return base;
  });
  const setProjects = React.useCallback((val) => {
    setProjectsRaw(prev => {
      const next = typeof val === 'function' ? val(prev) : val;
      window.PROJECTS = next;
      try { localStorage.setItem('projects-v2', JSON.stringify(next)); } catch {}
      return next;
    });
  }, []);

  // Lifted shared state: schedule assignments (drag/edit on producer view ↔ matrix view).
  const [assignments, setAssignmentsRaw] = React.useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('assignments-v1') || 'null');
      if (Array.isArray(saved) && saved.length) return saved;
    } catch {}
    return window.buildAssignments ? window.buildAssignments() : [];
  });
  const setAssignments = React.useCallback((val) => {
    setAssignmentsRaw(prev => {
      const next = typeof val === 'function' ? val(prev) : val;
      try { localStorage.setItem('assignments-v1', JSON.stringify(next)); } catch {}
      return next;
    });
  }, []);

  // ─── Firebase real-time sync (no-op if firebase-config.js is empty) ───
  const fbReady = !!(window.fb && window.fb.ready);
  const [fbStatus, setFbStatus] = React.useState(fbReady ? 'connecting' : 'disabled');
  const [fbUser, setFbUser]     = React.useState(null);
  const isApplyingSnapshot      = React.useRef(false);
  const hasSeenSnapshot         = React.useRef(false);
  const writeTimer              = React.useRef(null);

  React.useEffect(() => {
    if (!fbReady) return;
    const { docRef, auth } = window.fb;
    const unsubAuth = auth.onAuthStateChanged(u => setFbUser(u || null));
    const unsubData = docRef.onSnapshot(
      snap => {
        if (!snap.exists) {
          // Cloud empty → seed from current local state (which itself came
          // from localStorage or defaults). Runs at most once.
          if (!hasSeenSnapshot.current) {
            hasSeenSnapshot.current = true;
            docRef.set({
              producers, projects, assignments, teams,
              _seededAt: window.fb.serverTimestamp(),
            }).catch(e => console.error('[fb] seed failed:', e));
          }
          setFbStatus('connected');
          return;
        }
        const data = snap.data() || {};
        isApplyingSnapshot.current = true;
        if (Array.isArray(data.producers))   setProducersRaw(data.producers);
        if (Array.isArray(data.projects))    setProjectsRaw(data.projects);
        if (Array.isArray(data.assignments)) setAssignmentsRaw(data.assignments);
        if (Array.isArray(data.teams))       setTeamsRaw(data.teams);
        if (Array.isArray(data.producers))   window.PRODUCERS = data.producers;
        if (Array.isArray(data.projects))    window.PROJECTS  = data.projects;
        // Clear the flag after React commits the state updates.
        Promise.resolve().then(() => { isApplyingSnapshot.current = false; });
        hasSeenSnapshot.current = true;
        setFbStatus('connected');
      },
      err => { console.error('[fb] subscribe error:', err); setFbStatus('error'); }
    );
    return () => { unsubData(); unsubAuth(); };
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // Debounced write of the full workspace to Firestore whenever state changes.
  // Gated by isApplyingSnapshot so remote updates don't trigger their own echo.
  React.useEffect(() => {
    if (!fbReady) return;
    if (isApplyingSnapshot.current) return;
    if (!hasSeenSnapshot.current) return; // wait for first snapshot before writing
    clearTimeout(writeTimer.current);
    writeTimer.current = setTimeout(() => {
      // Drafts of new projects that the user hasn't named yet stay local until
      // committed — otherwise a 500ms-old empty draft would echo back as a
      // snapshot mid-typing and stomp on the input.
      const cleanProjects = projects.filter(p => (p.name || '').trim() !== '');
      window.fb.docRef.set({
        producers, projects: cleanProjects, assignments, teams,
        _updatedAt: window.fb.serverTimestamp(),
        _updatedBy: window.fb.auth.currentUser?.uid || 'anon',
        _updatedByEmail: window.fb.auth.currentUser?.email || null,
      }, { merge: true }).catch(err => {
        console.error('[fb] write failed:', err);
        setFbStatus('error');
      });
    }, 500);
    return () => clearTimeout(writeTimer.current);
  }, [producers, projects, assignments, teams, fbReady]);

  const fbSignIn = React.useCallback(() => {
    if (!fbReady) return Promise.reject(new Error('firebase-not-ready'));
    const provider = new window.fb.GoogleAuthProvider();
    return window.fb.auth.signInWithPopup(provider);
  }, [fbReady]);
  const fbSignOut = React.useCallback(() => {
    if (!fbReady) return;
    window.fb.auth.signOut();
  }, [fbReady]);

  // ─── Undo: up to 10 steps back across producers / projects / assignments / teams ───
  const [history, setHistory] = React.useState([]);
  const pushHistory = () => {
    setHistory(h => [...(h.length >= 10 ? h.slice(1) : h), { producers, projects, assignments, teams }]);
  };
  const undo = React.useCallback(() => {
    setHistory(h => {
      if (h.length === 0) return h;
      const prev = h[h.length - 1];
      setProducers(prev.producers);
      setProjects(prev.projects);
      setAssignments(prev.assignments);
      setTeams(prev.teams);
      return h.slice(0, -1);
    });
  }, [setProducers, setProjects, setAssignments, setTeams]);
  // Undo-aware setters passed to the views. Each snapshots the full state before mutating.
  const setProducersU   = (val) => { pushHistory(); setProducers(val); };
  const setProjectsU    = (val) => { pushHistory(); setProjects(val); };
  const setAssignmentsU = (val) => { pushHistory(); setAssignments(val); };
  const setTeamsU       = (val) => { pushHistory(); setTeams(val); };
  // Global Ctrl/Cmd+Z. Skipped when focus is in an editable element so the browser's
  // native text-undo keeps working inside inputs / textareas / contentEditable.
  React.useEffect(() => {
    const onKey = (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key && e.key.toLowerCase() === 'z' && !e.shiftKey) {
        const t = e.target;
        const tag = (t && t.tagName) ? t.tagName.toLowerCase() : '';
        if (tag === 'input' || tag === 'textarea' || (t && t.isContentEditable)) return;
        e.preventDefault();
        undo();
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [undo]);

  const navigate = (v, pid) => {
    setView(v);
    if (pid) setProducerId(pid);
    try {
      localStorage.setItem('view', v);
      if (pid) localStorage.setItem('producerId', pid);
    } catch {}
  };

  // Apply tweaks to root via CSS vars + classes.
  // density / fire / capbars are owned by SidebarSettings (user-facing) — don't write them here
  // or they'd race with the user's toggles.
  React.useEffect(() => {
    const r = document.documentElement;
    r.style.setProperty('--brand-orange', t.accent);
    r.dataset.cream = t.warmCream ? '1' : '0';
    r.dataset.loadStyle = t.loadStyle;
  }, [t]);

  return (
    <div className="app">
      <Sidebar view={view} setView={navigate} selectedProducer={producerId} producers={producers} setProducers={setProducersU} teams={teams} setTeams={setTeamsU} theme={theme} setTheme={setTheme} fbStatus={fbStatus} fbUser={fbUser} fbSignIn={fbSignIn} fbSignOut={fbSignOut}/>
      <main className="main">
        {view === 'board' && <BoardView navigate={navigate} projects={projects} setProjects={setProjectsU}/>}
        {view === 'matrix' && <MatrixView navigate={navigate} assignments={assignments} setAssignments={setAssignmentsU}/>}
        {view === 'producer' && <ProducerView producerId={producerId} navigate={navigate} producers={producers} setProducers={setProducersU} projects={projects} setProjects={setProjectsU} assignments={assignments} setAssignments={setAssignmentsU}/>}
      </main>
      <UndoButton count={history.length} onUndo={undo}/>
      <TweaksPanel title="Tweaks">
        <TweakSection label="פריסה"/>
        <TweakRadio label="צפיפות" value={t.density}
          options={[{value:'compact',label:'קומפקטי'},{value:'regular',label:'רגיל'},{value:'comfy',label:'מרווח'}]}
          onChange={(v) => setTweak('density', v)} />
        <TweakToggle label="רקע קרם חמים" value={t.warmCream}
          onChange={(v) => setTweak('warmCream', v)} />
        <TweakSection label="צבע מותג"/>
        <TweakColor label="צבע ראשי" value={t.accent}
          onChange={(v) => setTweak('accent', v)} />
        <TweakSection label="לוח מפיקים"/>
        <TweakRadio label="סגנון עומס" value={t.loadStyle}
          options={[{value:'bars',label:'פסים'},{value:'dots',label:'נקודות'},{value:'pct',label:'אחוז בלבד'}]}
          onChange={(v) => setTweak('loadStyle', v)} />
        <TweakToggle label="הצג פסי קיבולת" value={t.showCapacityBars}
          onChange={(v) => setTweak('showCapacityBars', v)} />
        <TweakToggle label="אייקוני 🔥 על דחופים" value={t.showFireIcons}
          onChange={(v) => setTweak('showFireIcons', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
